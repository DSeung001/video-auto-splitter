name: Build Binaries

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build executables
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --name lecture-auto-splitter auto_split.py
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name lecture-auto-splitter-gui auto_split_gui.py

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp dist/lecture-auto-splitter release/lecture-auto-splitter-${{ runner.os }}
          cp dist/lecture-auto-splitter-gui release/lecture-auto-splitter-gui-${{ runner.os }}
          cp config.example.yaml release/config.example.yaml

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item dist/lecture-auto-splitter.exe release/lecture-auto-splitter-Windows.exe
          Copy-Item dist/lecture-auto-splitter-gui.exe release/lecture-auto-splitter-gui-Windows.exe
          Copy-Item config.example.yaml release/config.example.yaml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lecture-auto-splitter-${{ runner.os }}
          path: release/*

      - name: Publish latest release assets (Windows)
        if: runner.os == 'Windows' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest build (main)
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: true
          body: Automated latest build from main branch.
          artifacts: |
            release/lecture-auto-splitter-Windows.exe
            release/lecture-auto-splitter-gui-Windows.exe
            release/config.example.yaml
